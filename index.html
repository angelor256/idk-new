<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración - El Botiquín</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-blue: #0033a0;
            --brand-orange: #ff7a00;
            --text-dark: #1e293b;
            --font-sans: 'Inter', sans-serif;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: var(--font-sans); background-color: #f1f5f9; color: var(--text-dark); padding: 30px 20px; }
        
        .admin-container { max-width: 800px; margin: 0 auto; }
        .back-link { display: inline-block; margin-bottom: 20px; color: var(--brand-blue); text-decoration: none; font-weight: 600; }
        
        .form-card { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); margin-bottom: 40px; }
        .form-card h2 { margin-bottom: 20px; font-size: 1.5rem; border-bottom: 2px solid #f1f5f9; padding-bottom: 10px; }
        
        .form-group { margin-bottom: 18px; display: flex; flex-direction: column; gap: 6px; }
        .form-group label { font-size: 0.9rem; font-weight: 600; color: #475569; }
        .form-control { padding: 10px; border: 1.5px solid #cbd5e1; border-radius: 6px; font-family: var(--font-sans); font-size: 0.95rem; }
        .form-control:focus { outline: none; border-color: var(--brand-blue); }
        
        /* Estilo especial para el input de archivo */
        .file-input-wrapper {
            position: relative;
            margin-top: 5px;
        }

        /* Vista previa de la imagen seleccionada */
        .image-preview {
            max-width: 1200px;
            height: 120px;
            object-fit: contain;
            margin-top: 10px;
            border-radius: 6px;
            border: 1px dashed #cbd5e1;
            padding: 5px;
            display: none;
        }
        
        .submit-btn { background-color: var(--brand-orange); color: white; border: none; padding: 12px; font-size: 1rem; font-weight: 700; border-radius: 6px; cursor: pointer; text-transform: uppercase; margin-top: 10px; width: 100%; transition: background 0.2s; }
        .submit-btn:hover { background-color: #e06b00; }

        /* Tabla Inventario */
        .inventory-card { background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .inventory-table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 0.9rem; }
        .inventory-table th, .inventory-table td { padding: 12px; text-align: left; border-bottom: 1px solid #e2e8f0; }
        .inventory-table th { background-color: #f8fafc; font-weight: 600; }
        .mini-preview { width: 40px; height: 40px; object-fit: contain; border-radius: 4px; background: #f8fafc; }
        .delete-btn { background-color: #ef4444; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: 600; }
        .delete-btn:hover { background-color: #dc2626; }
    </style>
</head>
<body>

    <div class="admin-container">
        <a href="index.html" class="back-link">← Volver al Inicio Público</a>
        
        <div class="form-card">
            <h2>Agregar Nuevo Producto al Inventario</h2>
            <form id="form-producto">
                <div class="form-group">
                    <label for="nombre">Nombre del Producto</label>
                    <input type="text" id="nombre" class="form-control" placeholder="Ej: Panadol Antigripal 20 tabletas" required>
                </div>
                <div class="form-group">
                    <label for="categoria">Categoría de Destino</label>
                    <select id="categoria" class="form-control" required>
                        <option value="medicamentos">Medicamentos</option>
                        <option value="cuidado-personal">Cuidado Personal</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="precio">Precio Público (en Colones, solo números)</label>
                    <input type="text" id="precio" class="form-control" placeholder="Ej: 3450" required>
                </div>
                <div class="form-group">
                    <label for="stock">Cantidad Disponible (Stock)</label>
                    <input type="number" id="stock" class="form-control" placeholder="Ej: 24" min="0" required>
                </div>
                
                <div class="form-group">
                    <label for="imagen-file">Foto del Producto (Adjuntar archivo .jpg, .png)</label>
                    <div class="file-input-wrapper">
                        <input type="file" id="imagen-file" class="form-control" accept="image/*" required>
                    </div>
                    <img id="preview-img" class="image-preview" alt="Vista previa">
                </div>

                <div class="form-group">
                    <label for="descripcion">Descripción Comercial / Indicaciones</label>
                    <textarea id="descripcion" class="form-control" rows="3" placeholder="Detalla su uso, miligramos o restricciones..." required></textarea>
                </div>
                <button type="submit" class="submit-btn">Publicar Producto Ahora</button>
            </form>
        </div>

        <div class="inventory-card">
            <h3>Control de Productos Publicados</h3>
            <table class="inventory-table">
                <thead>
                    <tr>
                        <th>Foto</th>
                        <th>Producto</th>
                        <th>Categoría</th>
                        <th>Precio</th>
                        <th>Existencias</th>
                        <th>Acción</th>
                    </tr>
                </thead>
                <tbody id="tabla-cuerpo"></tbody>
            </table>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('form-producto');
            const tablaCuerpo = document.getElementById('tabla-cuerpo');
            const fileInput = document.getElementById('imagen-file');
            const previewImg = document.getElementById('preview-img');
            
            let productos = JSON.parse(localStorage.getItem('productos_botiquin')) || [];
            let imagenBase64String = ""; // Aquí guardaremos la foto convertida temporalmente

            // 1. Lógica para capturar el archivo adjunto y mostrar la vista previa en pantalla
            fileInput.addEventListener('change', (e) => {
                const archivo = e.target.files[0];
                if (archivo) {
                    const lector = new FileReader();
                    lector.onload = function(evento) {
                        imagenBase64String = evento.target.result; // Foto convertida a texto puro exitosamente
                        previewImg.src = imagenBase64String;
                        previewImg.style.display = "block"; // Mostrar la miniatura en el formulario
                    }
                    lector.readAsDataURL(archivo);
                }
            });

            // 2. Renderizar la tabla de control
            function actualizarTabla() {
                tablaCuerpo.innerHTML = '';
                productos.forEach((prod, index) => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td><img src="${prod.imagen || 'https://via.placeholder.com/50'}" class="mini-preview" alt="Foto"></td>
                        <td><strong>${prod.nombre}</strong></td>
                        <td>${prod.categoria}</td>
                        <td>₡${prod.precio}</td>
                        <td>${prod.stock} uds.</td>
                        <td><button class="delete-btn" data-index="${index}">Eliminar</button></td>
                    `;
                    tablaCuerpo.appendChild(tr);
                });
            }

            // 3. Procesar el formulario al enviar
            form.addEventListener('submit', (e) => {
                e.preventDefault();
                
                const nuevoProd = {
                    id: Date.now(),
                    nombre: document.getElementById('nombre').value,
                    categoria: document.getElementById('categoria').value,
                    precio: document.getElementById('precio').value,
                    stock: document.getElementById('stock').value,
                    imagen: imagenBase64String, // Guardamos la foto convertida
                    descripcion: document.getElementById('descripcion').value
                };

                productos.push(nuevoProd);
                localStorage.setItem('productos_botiquin', JSON.stringify(productos));
                
                // Resetear interfaz
                form.reset();
                previewImg.style.display = "none";
                imagenBase64String = "";
                
                actualizarTabla();
                alert('¡Producto publicado! Ya puedes revisar el catálogo.');
            });

            // 4. Eliminar producto
            tablaCuerpo.addEventListener('click', (e) => {
                if(e.target.classList.contains('delete-btn')) {
                    const index = e.target.getAttribute('data-index');
                    if(confirm('¿Deseas quitar este producto del catálogo público?')) {
                        productos.splice(index, 1);
                        localStorage.setItem('productos_botiquin', JSON.stringify(productos));
                        actualizarTabla();
                    }
                }
            });

            actualizarTabla();
        });
    </script>
</body>
</html>
