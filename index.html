<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farmacia El Botiquín - Inicio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --brand-orange: #ff7a00;
            --brand-blue: #0033a0;
            --text-dark: #1e293b;
            --font-sans: 'Inter', sans-serif;
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }
        
        body {
            font-family: var(--font-sans);
            background-color: #fcfbfa;
            color: var(--text-dark);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* --- BARRA DE NAVEGACIÓN --- */
        .navbar {
            background-color: #ffffff;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 15px rgba(0,0,0,0.06);
            position: relative;
            z-index: 10;
        }

        .nav-logo img {
            height: 45px;
            width: auto;
            display: block;
        }

        .nav-menu {
            display: flex;
            gap: 25px;
        }

        .nav-link {
            text-decoration: none;
            color: var(--text-dark);
            font-weight: 700;
            font-size: 1rem;
            transition: color 0.2s ease;
        }

        .nav-link:hover { 
            color: var(--brand-orange); 
        }

        /* --- SECCIÓN PRINCIPAL (ESTILO FACEBOOK) --- */
        .hero-banner {
            /* Usamos la imagen de la portada como fondo exacto */
            background: url('608199843_1162481542711823_1638805636273324806_n.jpg') no-repeat center center;
            background-size: cover;
            position: relative;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            text-align: center;
        }

        /* Capa oscura sutil para que el botón resalte más en pantallas móviles */
        .hero-banner::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.05);
            z-index: 1;
        }

        .hero-content {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
            max-width: 900px;
            width: 100%;
        }

        /* Logotipo oficial en el puro centro */
        .center-logo-wrapper {
            background-color: transparent;
            padding: 10px;
            display: inline-block;
            margin-bottom: 120px; /* Espacio para que no tape las letras principales del diseño de fondo */
        }

        .center-logo {
            max-width: 260px;
            height: auto;
            filter: drop-shadow(0px 4px 10px rgba(0,0,0,0.15));
        }

        /* --- BOTÓN DE ENTRADA AL CATÁLOGO --- */
        .cta-btn {
            display: inline-block;
            background-color: var(--brand-blue);
            color: white;
            text-decoration: none;
            padding: 18px 45px;
            font-size: 1.2rem;
            font-weight: 800;
            border-radius: 50px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: 0 8px 25px rgba(0, 51, 160, 0.4);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 3px solid white;
        }

        .cta-btn:hover {
            transform: translateY(-4px);
            background-color: #ff7a00;
            box-shadow: 0 12px 28px rgba(255, 122, 0, 0.5);
        }

        /* Ajustes adaptables para celulares */
        @media (max-width: 768px) {
            .center-logo { max-width: 180px; }
            .center-logo-wrapper { margin-bottom: 40px; }
            .cta-btn { font-size: 1rem; padding: 14px 32px; }
            .hero-banner { background-position: 65% center; } /* Mueve un poco el fondo para centrar las letras en pantallas verticales */
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-logo">
            <img src="farmacia.png" alt="Farmacia El Botiquín">
        </div>
        <div class="nav-menu">
            <a href="index.html" class="nav-link">Inicio</a>
            <a href="catalogo.html" class="nav-link">Ver Catálogo</a>
        </div>
    </nav>

    <header class="hero-banner">
        <div class="hero-content">
            
            <div class="center-logo-wrapper">
                <img src="farmacia.png" alt="Logo Central" class="center-logo">
            </div>

            <a href="catalogo.html" class="cta-btn">Ingresar al Catálogo</a>
            
        </div>
    </header>

</body>
</html>
